<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/layouts/page.css">
    <script src="/assets/js/layouts/post.js" defer></script>
    <link rel="stylesheet" type="text/css" href="/assets/css/blockquote.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    {% include head.html %}
    <title>{{ page.title }}</title>
</head>
<body>
    {% include nav.html %}
    <div class="post-layout" id="postLayout">
        <aside class="post-sidebar" id="leftSide">
            <p class="sidebar-label">文章</p>
            <ul class="post-list">
                {% for post in site.posts %}
                <li class="post-item {% if post.title == page.title %}active{% endif %}">
                    <a href="{{ post.url }}" title="{{ post.title }}">
                        <span class="item-title">{{ post.title }}</span>
                        <span class="item-date">{{ post.date | date: "%Y-%m-%d" }}</span>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </aside>
        <button class="fold-btn fold-btn--left" id="leftBtn" onclick="foldLeft()" title="收起列表">
            <i class="fa fa-chevron-left" id="leftBtnIcon"></i>
        </button>

        <main class="post-main">
            <div class="post-header">
                <h1>{{ page.title }}</h1>
                <p class="post-date">{{ page.date | date: "%Y年%m月%d日" }}</p>
                <hr>
            </div>
            <div class="post-body" id="content">
                {{ content }}
            </div>
            <p class="post-back"><a href="/blog">← 返回博客</a></p>
        </main>

        <button class="fold-btn fold-btn--right" id="rightBtn" onclick="foldRight()" title="收起目录">
            <i class="fa fa-chevron-right" id="rightBtnIcon"></i>
        </button>
        <aside class="post-toc" id="rightToc">
            <p class="sidebar-label">目录</p>
            <ul id="tocList"></ul>
        </aside>
    </div>
</body>
</html>
