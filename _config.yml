author: DSGH
email: tai0@foxmail.com

title: DSGH的小窝
tagline: 个人博客
description: DSGH 的个人博客，记录编程、数学与思考。
url: https://dsghbc.github.io
locale: zh_CN

plugins:
  - jekyll-seo-tag

layout: defalut

permalink: /blog/:year/:month/:day/:title

highlighter: rouge

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

sass:
  sytle: compressed